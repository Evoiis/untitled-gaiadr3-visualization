model_name: orbit_mlp_35.0.pt

# Dataset Name: 14_20p
norm_path: "norms/orbit_norm_data_14_20p.json"
val_data_path: data/dataset_14_20p/validation_data
test_data_path: data/dataset_14_20p/test_data
training_data_path: data/dataset_14_20p/training_data

hidden_layers: [256, 256, 256, 256, 256, 256, 256, 256, 256]
epochs: 60
batch_size: 4096

use_dataloader: False
use_gradient_clipping: False
data_dtype: fp32 # [fp16, fp32, bf16]

grad_clip_max_norm: 0.1
optimizer: adam # [adam, adamW]

runs:
  1:
    training_data_filter: /orbit_train_*.npy
    min_learning_rate: 0.000001
    start_learning_rate: 0.001
    scheduler: plateau
    patience: 15
  2:
    training_data_filter: /orbit_train_*.npy
    min_learning_rate: 0.000001
    start_learning_rate: 0.001
    scheduler: plateau
    patience: 10
  3:
    training_data_filter: /orbit_train_*.npy
    min_learning_rate: 0.000001
    start_learning_rate: 0.001
    scheduler: plateau
    patience: 5