syntax = "proto3";

package mwm_msgs;

// All timestamps should time since epoch in seconds

message Star {
	int64 id = 1;
    int32 timestamp = 8;
	
	double pos_x = 2;
	double pos_y = 3;
	double pos_z = 4;
	
	float magnitude = 5;
	
	float bp_rp = 6;

	optional string name = 7;
}

message StarData {
    repeated Star stars = 1;
    int32 timestamp = 2;
}

message DataRequest {
    int32 timestamp = 1;
    string node_name = 2;
}
