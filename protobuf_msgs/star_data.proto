syntax = "proto3";

package mwm_msgs;

// All timestamps should be time since epoch in seconds

enum StarDataType {
    STAR_DATA = 0;
    MOTION_STAR_DATA = 1;
    ORBIT_STAR_DATA = 2;
}

message DataRequest {
    int32 timestamp = 1;
    string node_name = 2;
    StarDataType star_data_type = 3;
}

message StarData {
	optional string name = 1;
	
	double pos_x = 2;
	double pos_y = 3;
	double pos_z = 4;
	
	float brightness = 5;
    float size = 6;
	
	int32 color_r = 7;
	int32 color_g = 8;
	int32 color_b = 9;
}

message Stars {
    int32 timestamp = 1;
    map<int64, StarData> stars = 2;
}

message MotionStarData {
    double ra = 1;
    double dec = 2;
    double dist_kpc = 3;

    double pmra = 4;
    double pmdec = 5;
    double radial_velocity = 6;
}

message MotionStars {
    int32 timestamp = 1;
    map<int64, MotionStarData> stars = 2;
}
