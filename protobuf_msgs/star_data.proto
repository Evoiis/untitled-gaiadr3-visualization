syntax = "proto3";

package mwm_msgs;

// All timestamps should time since epoch in seconds

message StarData {
	int64 id = 1;
	optional string name = 7;
	
	double pos_x = 2;
	double pos_y = 3;
	double pos_z = 4;
	
	float brightness = 5;
    float size = 6;
	
	int32 color_r = 9;
	int32 color_g = 10;
	int32 color_b = 11;
}

message Stars {
    repeated StarData stars = 1;
    int32 timestamp = 2;
}

message DataRequest {
    int32 timestamp = 1;
    string node_name = 2;
}
